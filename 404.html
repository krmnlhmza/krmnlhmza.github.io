<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı — Muhammed Hamza Karamanlı</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .notfound .code {
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 800;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 18px;
    }
    .notfound p { max-width: 420px; margin-bottom: 28px; }
  </style>
</head>
<body>

<div class="notfound">
  <div class="code">404</div>
  <p>Aradığınız sayfa bulunamadı.<br>The page you are looking for could not be found.</p>
  <a class="btn btn-primary" href="/">Ana Sayfa / Home</a>
</div>

</body>
</html>
